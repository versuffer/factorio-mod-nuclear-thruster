[technology-name]
nuclear-thruster=Nuclear thruster
uranium-thruster-fuel-from-waste=Uranium thruster fuel from waste

[technology-description]
nuclear-thruster=Unlocks the ability to construct thruster that uses liquid uranium fuel as energy source and water as working fluid.
uranium-thruster-fuel-from-waste=Allows to reprocess depleted uranium fuel cells directly to uranium thruster fuel.

[fluid-name]
uranium-thruster-fuel=Uranium thruster fuel

[mod-setting-name]
enable-nuclear-thruster-fluid-box-symmetry=Enable [color=#00ff00][font=heading-2]Nuclear thruster[/font][/color] fluid box symmetry
enable-uranium-thruster-fuel-fuel-value-adjustment=Enable Uranium thruster fuel [fluid=uranium-thruster-fuel] fuel_value adjustment
uranium-thruster-fuel-fuel-value-kj=Uranium thruster fuel [fluid=uranium-thruster-fuel] fuel_value, kJ

nuclear-thruster-full-storage-efficiency-percent=[color=#00ff00][font=heading-2]Nuclear thruster[/font][/color] full storage efficiency, percent
nuclear-thruster-full-storage-fluid-usage-percent=[color=#00ff00][font=heading-2]Nuclear thruster[/font][/color] full storage fluid usage, percent
nuclear-thruster-storage-volume-units=[color=#00ff00][font=heading-2]Nuclear thruster[/font][/color] fuel/water storage volume, units

[mod-setting-description]
enable-nuclear-thruster-fluid-box-symmetry=Make Nuclear thruster fluid boxes vertically symmetrical.
enable-uranium-thruster-fuel-fuel-value-adjustment=This setting allows you to enable Uranium thruster fuel [fluid=uranium-thruster-fuel] energy capacity adjustment. Increasing fuel value leads to getting more thrust from the same amount of fuel burned.
uranium-thruster-fuel-fuel-value-kj=WARNING! Fuel value adjustment can increase thrust SIGNIFICANTLY! Be careful when setting fuel value above 1700 kJ. For example, if you want to get 2x more thrust, set 850 * 2 = 1700 kJ.

nuclear-thruster-full-storage-efficiency-percent=Percent of burned fuel energy transformed into thrust when fluid storages are full (see "Thruster perfomance curves").
nuclear-thruster-full-storage-fluid-usage-percent=Default 100% fluid usage is 60 units/s (fixed in-game value that can be changed only with quality upgrade). This setting allows you to modify the "ceiling" of thruster consumption range in percents relatively to default fluid usage. Example: 200% fluid usage = 60 * 2 = 120 units/s.
