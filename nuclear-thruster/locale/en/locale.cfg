[mod-name]
nuclear-thruster=Nuclear Thruster

[mod-description]
nuclear-thruster=Adds balanced late-game thruster that uses Uranium thruster tuel and water to operate. It has modified efficiency curve and significantly more thrust. Nuclear Thruster can be unlocked before Aquilo. You can also make Nuclear thruster symmetric and increase Uranium thruster fuel fuel_value to get more thrust.

[entity-name]
nuclear-thruster=Nuclear thruster

[entity-description]
nuclear-thruster=Next step in nuclear power technologies. This type of thrusters has significantly more thrust and extremely high efficiency but expensive in production. Nuclear thruster consumes special Uranium thruster fuel [fluid=uranium-thruster-fuel] and water [fluid=water] to operate.

